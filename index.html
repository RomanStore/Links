<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    cursor:pointer;
}

.overlay h1{
    color:#00f7ff;
}

/* CONTAINER */
.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
}

/* PROFILE */
.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
}

/* VISITS */
.visits{
    margin:10px 0;
    font-size:13px;
    opacity:0.85;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.link{
    padding:10px 12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    font-weight:600;
    border:2px solid transparent;
    transition:0.2s;
}

.link:hover{
    border:2px solid #38bdf8;
    transform:scale(1.02);
}

.link img{
    width:22px;
    height:22px;
}

.link span.username{
    font-size:11px;
    opacity:0.7;
}

/* MUSIC */
.music-player{
    margin-top:10px;
    background:#1f2937;
    border-radius:14px;
    padding:10px;
}

.music-btn{
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    color:#000;
    border:none;
    padding:8px 14px;
    border-radius:16px;
    cursor:pointer;
    font-weight:600;
    font-size:13px;
    margin-bottom:8px;
}

.volume-slider{
    width:100%;
}

/* BIO */
.bio{
    font-size:14px;
    min-height:20px;
    border-right:2px solid #00f7ff;
    white-space:nowrap;
    overflow:hidden;
    display:inline-block;
}
</style>
</head>

<body>

<!-- FIREBASE REALTIME FIX -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://roman-store-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const visitRef = ref(db, "visits/count");
const deviceRefKey = "roman_device_id";

let deviceId = localStorage.getItem(deviceRefKey);

if(!deviceId){
    deviceId = crypto.randomUUID();
    localStorage.setItem(deviceRefKey, deviceId);
}

const deviceRef = ref(db, "visits/devices/" + deviceId);

/* SAFE COUNT (NO DOUBLE BUG) */
get(deviceRef).then((snap)=>{
    if(!snap.exists()){
        set(deviceRef, true);
        runTransaction(visitRef, (current)=> (current || 0) + 1);
    }
});

/* REAL-TIME VISITS (NO REFRESH NEEDED) */
onValue(visitRef, (snapshot)=>{
    document.getElementById("visitCount").textContent = snapshot.val() || 0;
});
</script>

<!-- MUSIC + OVERLAY + BIO -->
<script>
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgMusic");
const volume = document.getElementById("volume");

overlay.addEventListener("click", async () => {
    overlay.style.display = "none";
    try { await audio.play(); } catch(e){}
});

audio.volume = 0.5;
volume.value = 0.5;

function toggleMusic(){
    if(audio.paused) audio.play();
    else audio.pause();
}

volume.addEventListener("input", ()=>{
    audio.volume = volume.value;
});

/* BIO TYPE + BACKSPACE LOOP */
const bioText = document.getElementById("bioText");

const texts = [
"ROMAN STORE TOP 1 KURDISH ONLINE GAMING STORE",
"BEST DIGITAL STORE IN KURDISTAN",
"FAST | SAFE | RELIABLE"
];

let i = 0;
let index = 0;
let deleting = false;

function type(){
    let current = texts[index];

    if(!deleting){
        bioText.textContent = current.substring(0, i++);
        if(i > current.length){
            deleting = true;
            setTimeout(type, 1200);
            return;
        }
    } else {
        bioText.textContent = current.substring(0, i--);
        if(i < 0){
            deleting = false;
            index = (index + 1) % texts.length;
            setTimeout(type, 300);
            return;
        }
    }

    setTimeout(type, deleting ? 40 : 70);
}

type();
</script>
