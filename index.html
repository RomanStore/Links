<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    cursor:pointer;
}
.overlay h1{
    color:#00f7ff;
}

/* MAIN */
.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.25);
    border:2px solid rgba(0,247,255,0.2);
    transition:0.3s;
}

.container:hover{
    border-color:#38bdf8;
    box-shadow:0 0 55px rgba(0,247,255,0.4);
}

/* PROFILE */
.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
}

/* BIO */
.bio{
    min-height:20px;
    border-right:2px solid #00f7ff;
    white-space:nowrap;
    overflow:hidden;
    display:inline-block;
    margin-bottom:10px;
}

/* VISITS */
.visits{
    font-size:13px;
    margin-bottom:10px;
    opacity:0.8;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.link{
    padding:10px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    font-weight:600;
    border:2px solid transparent;
    transition:0.2s;
}

.link:hover{
    border-color:#7dd3fc;
    transform:scale(1.02);
}

.link:active{
    border-color:#38bdf8;
}

.link img{
    width:22px;
}

/* MUSIC */
.music-player{
    margin-top:10px;
    background:#1f2937;
    border-radius:12px;
    padding:10px;
}

.music-btn{
    padding:8px 14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <h1>CLICK ANYWHERE TO ENTER</h1>
</div>

<div class="container">

<img src="bgimage.jpg" class="profile">

<h1>Roman Store</h1>

<div class="visits">
👁️ <span id="visitCount">0</span> visits
</div>

<p class="bio" id="bioText"></p>

<div class="links">
<a class="link" href="https://snapchat.com/add/roman_store4">
<img src="https://cdn.simpleicons.org/snapchat/white">
<span>Snapchat</span>
<span>roman_store4</span>
</a>

<a class="link" href="https://tiktok.com/@roman_store4">
<img src="https://cdn.simpleicons.org/tiktok/white">
<span>TikTok</span>
<span>roman_store4</span>
</a>

<a class="link" href="https://facebook.com/roman.mhamad.196510">
<img src="https://cdn.simpleicons.org/facebook/white">
<span>Facebook</span>
<span>roman.mhamad.196510</span>
</a>

<a class="link" href="https://wa.me/9647517039789">
<img src="https://cdn.simpleicons.org/whatsapp/white">
<span>WhatsApp</span>
<span>+9647517039789</span>
</a>

<a class="link" href="https://t.me/RomanMhamad">
<img src="https://cdn.simpleicons.org/telegram/white">
<span>Telegram</span>
<span>RomanMhamad</span>
</a>
</div>

<div class="music-player">

<audio id="bgMusic">
<source src="bgmusic.mp3">
</audio>

<button class="music-btn" id="musicBtn">▶ Play</button>

</div>

</div>

<script>
/* ================= OVERLAY FIX ================= */
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

let started = false;

overlay.addEventListener("click", () => {
    overlay.style.display = "none";
    
    if(!started){
        audio.play().catch(()=>{});
        started = true;
        btn.textContent = "⏸ Pause";
    }
});

/* ================= PLAY / PAUSE FIX ================= */
btn.addEventListener("click", () => {
    if(audio.paused){
        audio.play();
        btn.textContent = "⏸ Pause";
    } else {
        audio.pause();
        btn.textContent = "▶ Play";
    }
});

/* ================= BIO FIX (2 TEXT ONLY) ================= */
const texts = [
    "ROMAN STORE BEST KURDISH ONLINE STORE",
    "SAFE , RELIABLE , RESPECTFUL"
];

let i = 0;
let t = 0;
let deleting = false;

const bio = document.getElementById("bioText");

function type(){
    let current = texts[t];

    if(!deleting){
        bio.textContent = current.substring(0, i++);
        if(i > current.length){
            deleting = true;
            setTimeout(type, 1200); // pause
            return;
        }
    } else {
        bio.textContent = current.substring(0, i--);
        if(i < 0){
            deleting = false;
            t = (t + 1) % texts.length;
            setTimeout(type, 500);
            return;
        }
    }

    setTimeout(type, deleting ? 40 : 70);
}

type();
</script>

</body>
</html>
