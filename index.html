.links{

.link{

    gap:14px;
    transition:0.2s;
    font-weight:600;
    backdrop-filter: blur(4px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

.link:hover{
    transform: translateY(-3px);

.link:active{

}

.link img{

.link span:first-of-type {

    letter-spacing: 0.3px;
}

.link span.username{

    opacity:0.7;

.music-player{

    backdrop-filter: blur(12px);

.music-title{
    font-size:15px;

.music-btn{
    background:linear-gradient(125deg,#00c6ff,#0072ff);

    border-radius:60px;

}

.music-btn.playing{
    background: linear-gradient(125deg,#f43f5e,#e11d48);

}

.music-btn:hover {
    transform: scale(1.02);
    filter: brightness(1.05);
}

.music-btn:active {
    transform: scale(0.96);
}
</style>

<div class="music-player">
<div class="music-title">🎵 Background Sound • lofi vibes 🎧</div>

<audio id="bgMusic" loop preload="auto" autoplay>
    <source src="bgmusic.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<button class="music-btn playing" id="playBtn">⏸️ Pause</button>

</div>

<script>
    (function() {
        // Get audio element and button
        const audio = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        
        // state: music playing status (true = playing, false = paused)
        let isPlaying = true;
        
        // Force autoplay: ensure that the audio starts immediately when page loads
        // The 'autoplay' attribute on <audio> already triggers native autoplay.
        // But some browsers might block if not enough interaction, but we call .play()
        // explicitly to maximize chance of auto-playing right away (no button press needed).
        // We also handle promise to keep UI in sync.
        
        // Attempt to play and guarantee sync with button state
        function attemptAutoPlay() {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // Autoplay succeeded: music is playing automatically
                    isPlaying = true;
                    playBtn.textContent = "⏸️ Pause";
                    playBtn.classList.add("playing");
                }).catch((error) => {
                    // Autoplay was prevented by browser policy (rare if autoplay attribute present)
                    // But we still show the correct UI: music NOT playing automatically.
                    // However requirement: "start automatically" - we will try another method:
                    // We add a visibility listener + retry one more time after micro delay,
                    // but to respect full autoplay, we also try to play on any user click? NO - 
                    // the goal is auto without pressing play button. So we retry .play() on window load
                    // and on first visibility change. Also modern Chrome sometimes allows if user interacted with site before.
                    // But final touch: we set a small timeout to replay for browsers that are "almost ready"
                    console.warn("Initial autoplay blocked, retrying in background...", error);
                    // Extra attempt: after a short delay, try again (some browsers allow after DOM fully painted)
                    setTimeout(() => {
                        audio.play().then(() => {
                            isPlaying = true;
                            playBtn.textContent = "⏸️ Pause";
                            playBtn.classList.add("playing");
                        }).catch(() => {
                            // final fallback: show paused UI, but still the button can be clicked by user.
                            // But to satisfy requirement: we set isPlaying false and button shows play,
                            // however we still do our best: we also bind a one-tap "anywhere" to autoplay silently? 
                            // But that would require user tap, which violates "automatically". 
                            // Since the question strictly wants "when link opened, it starts automatically",
                            // we keep the autoplay attribute + multiple play attempts. 
                            isPlaying = false;
                            playBtn.textContent = "▶️ Play";
                            playBtn.classList.remove("playing");
                        });
                    }, 80);
                });
            } else {
                // fallback for older browsers
                if (!audio.paused) {
                    isPlaying = true;
                    playBtn.textContent = "⏸️ Pause";
                    playBtn.classList.add("playing");
                } else {
                    isPlaying = false;
                    playBtn.textContent = "▶️ Play";
                    playBtn.classList.remove("playing");
                }
            }
        }
        
        // Ensure the audio metadata loaded and autoplay
        if (audio.readyState >= 2) {
            attemptAutoPlay();
        } else {
            audio.addEventListener('canplaythrough', attemptAutoPlay, { once: true });
            // also try immediate because autoplay attribute might already trigger
            setTimeout(attemptAutoPlay, 20);
        }
        
        // Double guarantee: on full window load, try to play again if it's not playing
        window.addEventListener('load', function() {
            // if after load music is still paused (due to strict policies), attempt again
            if (audio.paused) {
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.textContent = "⏸️ Pause";
                    playBtn.classList.add("playing");
                }).catch(() => { /* already handled */ });
            } else {
                // if playing, just sync UI
                isPlaying = true;
                playBtn.textContent = "⏸️ Pause";
                playBtn.classList.add("playing");
            }
        });
        
        // Toggle function for button (pause/play) without breaking autoplay requirement
        window.toggleMusic = function() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = "▶️ Play";
                playBtn.classList.remove("playing");
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    playBtn.textContent = "⏸️ Pause";
                    playBtn.classList.add("playing");
                    isPlaying = true;
                }).catch((err) => {
                    // if play fails for any reason (rare), keep button as Play
                    console.warn("Playback failed", err);
                });
            }
        };
        
        // attach event listener to button (ensuring no duplication)
        if (playBtn) {
            // remove any existing inline onclick to avoid double binding, but we keep global toggleMusic
            // we replace with clean event listener
            const newBtn = playBtn.cloneNode(true);
            playBtn.parentNode.replaceChild(newBtn, playBtn);
            const finalBtn = document.getElementById('playBtn');
            finalBtn.addEventListener('click', (e) => {
                e.preventDefault();
                window.toggleMusic();
            });
            // update global reference
            window.playBtn = finalBtn;
            // also sync initial UI if autoplay worked
            setTimeout(() => {
                if (!audio.paused) {
                    finalBtn.textContent = "⏸️ Pause";
                    finalBtn.classList.add("playing");
                    isPlaying = true;
                } else {
                    finalBtn.textContent = "▶️ Play";
                    finalBtn.classList.remove("playing");
                    isPlaying = false;
                    // One more autoplay attempt on page fully ready - but already tried
                    // Only for extreme cases: if user hasn't interacted but autoplay attribute didn't work,
                    // we do not force click, but all efforts are done.
                }
            }, 100);
        }
        
        // Additional: monitor if audio stops unexpectedly due to external reasons
        audio.addEventListener('pause', () => {
            if (audio.currentTime > 0 && !audio.ended && isPlaying === true) {
                // if paused externally but we think it's playing -> sync UI
                if (!playBtn.classList.contains('playing') && playBtn.textContent !== "⏸️ Pause") {
                    isPlaying = false;
                    playBtn.textContent = "▶️ Play";
                    playBtn.classList.remove("playing");
                }
            }
        });
        
        audio.addEventListener('play', () => {
            if (!isPlaying) {
                isPlaying = true;
                playBtn.textContent = "⏸️ Pause";
                playBtn.classList.add("playing");
            }
        });
        
        // If browser blocks autoplay due to high media engagement, but the autoplay attribute
        // will often work when user lands directly from a link (in many modern browsers if the site has low MEI)
        // To fully respect "automatically" we also try to play when document becomes visible after hidden (tab switch)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && audio.paused && !isPlaying) {
                // optional: if user returns to tab and music was paused but they didn't press anything, 
                // we don't autoplay aggressively because that might annoy. But we do nothing here.
                // But we only ensure that the requirement of initial autoplay is already done.
            }
        });
        
        // final safety: remove any browser default blocking context by setting volume to max
        audio.volume = 1.0;
    })();
</script>
