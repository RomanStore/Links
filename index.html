<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
}

.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
    margin-bottom:10px;
}

h1{margin:5px 0;}

.bio{
    font-size:14px;
    opacity:0.8;
    margin-bottom:10px;
}

.visits{
    font-size:13px;
    opacity:0.8;
    margin-bottom:12px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.link{
    padding:10px 12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    font-weight:600;
    transition:0.2s;
}

.link:hover{
    transform:scale(1.02);
}

.link img{
    width:22px;
    height:22px;
}

.link span.username{
    font-size:11px;
    opacity:0.7;
}

.music-player{
    margin-top:10px;
    background:#1f2937;
    border-radius:14px;
    padding:10px;
}

.music-btn{
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    color:#000;
    border:none;
    padding:8px 14px;
    border-radius:16px;
    cursor:pointer;
    font-weight:600;
    font-size:13px;
    margin-bottom:8px;
}

.volume-slider{
    width:100%;
}
</style>
</head>

<body>

<div class="container">

<img src="bgimage.jpg" class="profile">

<h1>Roman Store</h1>

<!-- VISITS -->
<div class="visits">
👁️ <span id="visitCount">0</span> visits
</div>

<p class="bio">ROMAN STORE TOP 1 KURDISH ONLINE GAMING STORE</p>

<div class="links">

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/snapchat/white">
<span>Snapchat</span>
<span class="username">roman_store4</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/tiktok/white">
<span>TikTok</span>
<span class="username">roman_store4</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/facebook/white">
<span>Facebook</span>
<span class="username">roman.mhamad.196510</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/whatsapp/white">
<span>WhatsApp</span>
<span class="username">+9647517039789</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/telegram/white">
<span>Telegram</span>
<span class="username">RomanMhamad</span>
</a>

</div>

<!-- MUSIC -->
<div class="music-player">

<audio id="bgMusic" loop>
<source src="bgmusic.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">▶️ Play / Pause</button>

<input type="range" min="0" max="1" step="0.01" class="volume-slider" id="volume">

</div>

</div>

<script>
/* =========================
   VISITOR COUNTER (LOCAL)
========================= */
let count = localStorage.getItem("roman_visits");

if(!count){
    count = 1;
} else {
    count = parseInt(count) + 1;
}

localStorage.setItem("roman_visits", count);
document.getElementById("visitCount").textContent = count;

/* =========================
   MUSIC SYSTEM
========================= */
const audio = document.getElementById("bgMusic");
const volume = document.getElementById("volume");

audio.volume = 0.5;
volume.value = 0.5;

function toggleMusic(){
    if(audio.paused){
        audio.play();
    } else {
        audio.pause();
    }
}

volume.addEventListener("input",()=>{
    audio.volume = volume.value;
});
</script>

</body>
</html>
