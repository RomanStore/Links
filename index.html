<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    max-width:420px;
    text-align:center;
    border:2px solid rgba(0,247,255,0.2);
}
.bio{
    border-right:2px solid #00f7ff;
    white-space:nowrap;
    overflow:hidden;
}
</style>
</head>

<body>

<div class="container">
<h1>Roman Store</h1>

<div>👁️ <span id="visitCount">0</span> visits</div>
<p class="bio" id="bioText"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVcBdKGFqUTSK4QWPicEMfzuK5Xq4wh4Y",
  authDomain: "roman-store.firebaseapp.com",
  databaseURL: "https://roman-store-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "roman-store",
  storageBucket: "roman-store.firebasestorage.app",
  messagingSenderId: "35203690693",
  appId: "1:35203690693:web:e23cc9311c2f9a44f180ac"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const visitRef = ref(db,"visits/count");

/* GET IP */
async function getIP(){
    try{
        let res = await fetch("https://api.ipify.org?format=json");
        let data = await res.json();
        return data.ip;
    }catch{
        return null;
    }
}

/* FINGERPRINT */
function getFingerprint(){
    return navigator.userAgent + screen.width + screen.height;
}

/* MAIN LOGIC */
(async ()=>{
    const ip = await getIP();
    const fingerprint = getFingerprint();

    const id = btoa(ip + fingerprint).replace(/=/g,'');

    const deviceRef = ref(db,"devices/"+id);

    const snap = await get(deviceRef);

    if(!snap.exists()){
        await set(deviceRef,true);
        await runTransaction(visitRef,(v)=>(v||0)+1);
    }
})();

/* REALTIME */
onValue(visitRef,(snap)=>{
    document.getElementById("visitCount").innerText = snap.val() || 0;
});
</script>

<script>
/* BIO */
const texts=[
"ROMAN STORE BEST KURDISH ONLINE STORE",
"SAFE , RELIABLE , RESPECTFUL"
];

let i=0,t=0,del=false;
const bio=document.getElementById("bioText");

function type(){
let txt=texts[t];

if(!del){
    bio.textContent=txt.substring(0,i++);
    if(i>txt.length){
        del=true;
        setTimeout(type,1500);
        return;
    }
}else{
    bio.textContent=txt.substring(0,i--);
    if(i<0){
        del=false;
        t=(t+1)%texts.length;
    }
}
setTimeout(type, del?40:70);
}
type();
</script>

</body>
</html>
