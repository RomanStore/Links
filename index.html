<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    cursor:pointer;
    text-align:center;
}
.overlay h1{ color:#00f7ff; }

/* MAIN */
.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.25);
    border:2px solid rgba(0,247,255,0.2);
}

/* PROFILE */
.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
}

/* BIO (ONLY RTL HERE) */
.bio{
    direction: rtl;
    text-align: right;
    min-height:20px;
    border-left:2px solid #00f7ff;
    white-space:nowrap;
    overflow:hidden;
    display:inline-block;
    margin-bottom:10px;
}

/* VISITS (NORMAL) */
.visits{
    font-size:13px;
    margin-bottom:10px;
    opacity:0.8;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.link{
    padding:10px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    font-weight:600;
    border:2px solid transparent;
    transition:all 0.25s ease;
}

.link:hover{
    transform:scale(1.05);
    border-color:#38bdf8;
    box-shadow:0 0 12px #38bdf8;
}

.link:active{
    transform:scale(0.96);
    border-color:#7dd3fc;
    box-shadow:0 0 6px #7dd3fc inset;
}

.link img{ width:22px; }

/* MUSIC */
.music-player{
    margin-top:10px;
    background:#1f2937;
    border-radius:12px;
    padding:10px;
}

.music-btn{
    padding:8px 14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    font-weight:600;
    cursor:pointer;
    transition:all 0.25s ease;
}

.music-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 12px #38bdf8;
}

.music-btn:active{
    transform:scale(0.95);
    box-shadow:0 0 6px #7dd3fc inset;
}

.volume-slider{
    width:100%;
    margin-top:8px;
    cursor:pointer;
}

/* MADE BY */
.made-by{
    margin-top:12px;
    font-size:12px;
    opacity:0.7;
    direction: rtl;
}

.made-by a{
    display:inline-flex;
    align-items:center;
    gap:5px;
    text-decoration:none;
    color:#38bdf8;
    transition:0.2s;
    direction: ltr;
}

.made-by a:hover{
    opacity:1;
    text-shadow:0 0 6px #38bdf8;
}

.made-by img{
    width:14px;
}
</style>
</head>

<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVcBdKGFqUTSK4QWPicEMfzuK5Xq4wh4Y",
  authDomain: "roman-store.firebaseapp.com",
  databaseURL: "https://roman-store-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "roman-store",
  storageBucket: "roman-store.firebasestorage.app",
  messagingSenderId: "35203690693",
  appId: "1:35203690693:web:e23cc9311c2f9a44f180ac"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const visitRef = ref(db, "visits/count");

function getDeviceID(){
    let id = localStorage.getItem("device_id");
    if(!id){
        id = navigator.userAgent + screen.width + screen.height;
        id = btoa(id).substring(0,30);
        localStorage.setItem("device_id", id);
    }
    return id;
}

const deviceId = getDeviceID();
const deviceRef = ref(db, "devices/" + deviceId);

get(deviceRef).then(async (snap)=>{
    if(!snap.exists()){
        await set(deviceRef, true);
        await runTransaction(visitRef, (val)=>(val||0)+1);
    }
});

onValue(visitRef,(snap)=>{
    document.getElementById("visitCount").innerText = snap.val() || 0;
});
</script>

<script>
const overlay=document.getElementById("overlay");
const audio=document.getElementById("bgMusic");
const volume=document.getElementById("volume");
const btn=document.getElementById("musicBtn");

overlay.addEventListener("click",()=>{
    overlay.style.display="none";
    audio.play();
    btn.textContent="⏸ Pause";
});

audio.volume=0.5;
volume.value=0.5;

volume.addEventListener("input",()=>{
    audio.volume=volume.value;
});

btn.addEventListener("click",()=>{
    if(audio.paused){
        audio.play();
        btn.textContent="⏸ Pause";
    }else{
        audio.pause();
        btn.textContent="▶ Play";
    }
});

audio.addEventListener("ended",()=>{
    btn.textContent="▶ Play";
});

/* BIO */
const texts=[
"تۆپ ١ ی ستۆرە ئۆنڵاینەکان لە کوردستان",
"ڕاستگۆیی | متمانە | خێرایی | هەرزانی"
];

let i=0,t=0,del=false;
const bio=document.getElementById("bioText");

function type(){
let txt=texts[t];

if(!del){
    bio.textContent=txt.substring(0,i++);
    if(i>txt.length){
        del=true;
        setTimeout(type,1500);
        return;
    }
}else{
    bio.textContent=txt.substring(0,i--);
    if(i<0){
        del=false;
        t=(t+1)%texts.length;
    }
}
setTimeout(type, del?40:70);
}
type();
</script>
