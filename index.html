<style>

/* ================= OVERLAY ================= */
.overlay{

/* ================= MAIN CARD ================= */
.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.25);

    overflow:hidden;

.visits{

.links{

.link{

    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    font-weight:600;
    transition:0.2s;
    border:2px solid transparent;

.link:hover{

    cursor:pointer;

<!-- ================= FIREBASE FIXED VISITS ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://roman-store-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "roman-store",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const visitRef = ref(db, "visits/count");

/* 🔥 FIXED: SAFE REAL COUNTER (NO DOUBLE BUGS) */
function registerVisit(){
    const visited = sessionStorage.getItem("visited");

    if(!visited){
        sessionStorage.setItem("visited","1");

        runTransaction(visitRef, (current)=>{
            return (current || 0) + 1;
        });
    }
}

/* realtime display */
onValue(visitRef, (snap)=>{
    document.getElementById("visitCount").innerText = snap.val() || 0;
});

/* start */
registerVisit();
</script>

<!-- ================= YOUR ORIGINAL SCRIPT ================= -->
<script>
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgMusic");
const volume = document.getElementById("volume");

overlay.addEventListener("click", async ()=>{
    overlay.style.display="none";
    try{
        await audio.play();
    }catch(e){}
});

audio.volume = 0.5;
volume.value = 0.5;

volume.addEventListener("input",()=>{
    audio.volume = volume.value;
});

function toggleMusic(){
    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
});

const bioText = document.getElementById("bioText");

const texts = [
    "ROMAN STORE BEST KURDISH ONLINE STORE",
    "SAFE , RELIABLE , RESPECTFUL"
];

let i=0,index=0,deleting=false;

function type(){
    let current = texts[index];

    if(!deleting){
        bioText.textContent = current.substring(0,i++);
        if(i>current.length){
            deleting=true;
            setTimeout(type,1500);
            return;
        }
    }else{
        bioText.textContent = current.substring(0,i--);
        if(i<0){
            deleting=false;
            index=(index+1)%texts.length;
            setTimeout(type,500);
            return;
        }
    }

    setTimeout(type, deleting?35:60);
}

type();
</script>
