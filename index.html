<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #00f7ff;
    margin-bottom:10px;
}

h1{margin:5px 0;}
.bio{
    font-size:14px;
    opacity:0.7;
    margin-bottom:20px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
}

.link{
    padding:14px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    transition:0.2s;
    font-weight:600;
}

.link:hover{transform:translateY(-2px);}
.link:active{transform:scale(0.97);}

.link img{
    width:24px;
    height:24px;
}

.link span.username{
    font-size:12px;
    opacity:0.7;
}

.music-player{
    background:#1f2937;
    border-radius:15px;
    padding:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.music-title{
    font-size:14px;
    font-weight:600;
}

.music-btn, .volume-btn{
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    color:#000;
    border:none;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
    font-weight:600;
    margin:3px;
    min-width:70px;
}

.music-btn.playing{
    background:linear-gradient(135deg,#f093fb,#f5576c);
}
.volume-controls{
    display:flex;
    gap:10px;
    margin-top:5px;
}
</style>
</head>

<body>

<!-- Music Player -->
<div class="music-player">
<div class="music-title">🎵 Background Sound</div>

<audio id="bgMusic" loop>
    <source src="bgmusic.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" id="playBtn" onclick="toggleMusic()">▶️ Play</button>

<div class="volume-controls">
    <button class="volume-btn" onclick="changeVolume(-0.1)">🔉 -</button>
    <button class="volume-btn" onclick="changeVolume(0.1)">🔊 +</button>
</div>

</div>

</div>

<script>
const audio = document.getElementById('bgMusic');
const playBtn = document.getElementById('playBtn');
let isPlaying = false;
let autoplayTriggered = false;

// Attempt to autoplay on first user click (required by modern browsers)
function startMusicOnFirstClick() {
    if (!autoplayTriggered) {
        audio.play().then(() => {
            isPlaying = true;
            playBtn.textContent = "⏸️ Pause";
            playBtn.classList.add("playing");
            autoplayTriggered = true;
        }).catch(() => {
            playBtn.textContent = "▶️ Play";
            playBtn.classList.remove("playing");
        });
        document.removeEventListener('click', startMusicOnFirstClick);
    }
}
document.addEventListener('click', startMusicOnFirstClick);

function toggleMusic(){
    if(isPlaying){
        audio.pause();
        playBtn.textContent = "▶️ Play";
        playBtn.classList.remove("playing");
        isPlaying = false;
    } else {
        audio.play();
        playBtn.textContent = "⏸️ Pause";
        playBtn.classList.add("playing");
        isPlaying = true;
        autoplayTriggered = true;
    }
}

// Volume control: value between 0 and 1
function changeVolume(amount){
    let newVolume = audio.volume + amount;
    if(newVolume > 1) newVolume = 1;
    if(newVolume < 0) newVolume = 0;
    audio.volume = newVolume;
}
</script>
