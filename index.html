<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* INTRO */
#intro{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(14px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    z-index:999;
}

/* MAIN */
.container{
    background:#111827;
    padding:25px;
    border-radius:20px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
    opacity:0;
    transform:scale(0.95);
    transition:0.5s;
}

.container.show{
    opacity:1;
    transform:scale(1);
}

.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
    margin-bottom:10px;
}

h1{margin:5px 0;}

.visits{
    margin:10px 0;
    font-size:14px;
    opacity:0.8;
}

.bio{
    font-size:14px;
    opacity:0.8;
    margin-bottom:18px;
    border-right:2px solid #00f7ff;
    white-space:nowrap;
    overflow:hidden;
    display:inline-block;
}

.links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.link{
    padding:10px 12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    font-weight:600;
}

.link img{width:22px;height:22px;}
.link span.username{font-size:11px;opacity:0.7;}

.music-player{
    background:#1f2937;
    border-radius:15px;
    padding:12px;
    margin-top:12px;
}

.music-btn{
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    color:#000;
    border:none;
    padding:8px 16px;
    border-radius:18px;
    cursor:pointer;
    font-weight:600;
}

.volume-slider{
    width:100%;
    margin-top:8px;
}
</style>
</head>

<body>

<!-- CLICK ANYWHERE SCREEN -->
<div id="intro">CLICK ANYWHERE</div>

<div class="container" id="main">

<img src="bgimage.jpg" class="profile">

<h1>Roman Store</h1>

<div class="visits">👁️ Visitors: <span id="visitCount">0</span></div>

<p class="bio" id="bioText"></p>

<div class="links">

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/snapchat/white">
<span>Snapchat</span>
<span class="username">roman_store4</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/tiktok/white">
<span>TikTok</span>
<span class="username">roman_store4</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/facebook/white">
<span>Facebook</span>
<span class="username">roman.mhamad.196510</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/whatsapp/white">
<span>WhatsApp</span>
<span class="username">+9647517039789</span>
</a>

<a href="#" class="link">
<img src="https://cdn.simpleicons.org/telegram/white">
<span>Telegram</span>
<span class="username">RomanMhamad</span>
</a>

</div>

<div class="music-player">

<audio id="bgMusic" loop>
<source src="bgmusic.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">▶️ Play / Pause</button>

<input type="range" min="0" max="1" step="0.01" class="volume-slider" id="volume">

</div>

</div>

<script>

const intro=document.getElementById("intro");
const main=document.getElementById("main");
const audio=document.getElementById("bgMusic");
const volume=document.getElementById("volume");

/* VOLUME */
audio.volume=0.5;
volume.value=0.5;

/* INTRO CLICK ANYWHERE */
intro.addEventListener("click",startSite);

function startSite(){

    intro.style.display="none";
    main.classList.add("show");

    audio.play();

    loadVisits();

    // save device so refresh won't count again
    if(!localStorage.getItem("visited")){
        localStorage.setItem("visited","yes");
    }
}

/* VISITOR COUNTER (FIXED - ONCE PER DEVICE) */
function loadVisits(){

    if(localStorage.getItem("visitedCounted")){
        // already counted this device
        document.getElementById("visitCount").textContent =
        localStorage.getItem("globalCount") || 1;
        return;
    }

    fetch("https://api.countapi.xyz/hit/roman-store/main")
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("visitCount").textContent=data.value;
        localStorage.setItem("globalCount",data.value);
        localStorage.setItem("visitedCounted","true");
    })
    .catch(()=>{
        let local = localStorage.getItem("fallbackCount") || 0;
        local++;
        localStorage.setItem("fallbackCount",local);
        document.getElementById("visitCount").textContent=local;
    });
}

/* MUSIC */
function toggleMusic(){
    if(audio.paused) audio.play();
    else audio.pause();
}

/* VOLUME SLIDER */
volume.addEventListener("input",()=>{
    audio.volume=volume.value;
});

/* TYPE TEXT */
const text="ROMAN STORE TOP 1 KURDISH ONLINE GAMING STORE";
const bio=document.getElementById("bioText");

let i=0,del=false;

function type(){
if(!del){
bio.textContent=text.substring(0,i++);
if(i>text.length){del=true;setTimeout(type,1000);return;}
}else{
bio.textContent=text.substring(0,i--);
if(i<0){del=false;setTimeout(type,300);return;}
}
setTimeout(type,del?40:60);
}
type();

</script>

</body>
</html>
