<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* START SCREEN */
#start{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
    cursor:pointer;
    font-size:22px;
    text-align:center;
}

/* MAIN */
.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
}

.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
}

h1{margin:5px 0;}

.bio{
    font-size:14px;
    opacity:0.8;
}

.visits{
    font-size:13px;
    margin:10px 0;
    opacity:0.8;
}

.links a{
    display:flex;
    flex-direction:column;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    margin:6px 0;
    padding:10px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    border:2px solid transparent;
    transition:0.2s;
}

.links a:hover{
    border:2px solid #00e5ff;
    transform:scale(1.02);
}

.username{
    font-size:11px;
    opacity:0.7;
}

/* MUSIC */
.music{
    margin-top:10px;
}

input[type=range]{
    width:100%;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="start">CLICK ANYWHERE TO ENTER</div>

<div class="container">

<img class="profile" src="bgimage.jpg">

<h1>Roman Store</h1>

<div class="visits">
👁️ <span id="v">0</span> visits
</div>

<p class="bio">ROMAN STORE TOP 1 KURDISH ONLINE GAMING STORE</p>

<div class="links">

<a href="https://snapchat.com/add/roman_store4">
Snapchat
<span class="username">roman_store4</span>
</a>

<a href="https://tiktok.com/@roman_store4">
TikTok
<span class="username">roman_store4</span>
</a>

<a href="https://facebook.com/roman.mhamad.196510">
Facebook
<span class="username">roman.mhamad.196510</span>
</a>

<a href="https://wa.me/9647517039789">
WhatsApp
<span class="username">+9647517039789</span>
</a>

<a href="https://t.me/RomanMhamad">
Telegram
<span class="username">RomanMhamad</span>
</a>

</div>

<div class="music">
<audio id="audio" loop>
<source src="bgmusic.mp3">
</audio>

<button onclick="toggle()">Play / Pause</button>
<input type="range" min="0" max="1" step="0.01" id="vol">
</div>

</div>

<script>
/* ================= FIREBASE RTDB ================= */
const dbURL = "https://roman-store-default-rtdb.europe-west1.firebasedatabase.app";

async function loadVisits(){
    const res = await fetch(dbURL + "/visits.json");
    let data = await res.json();

    if(!data) data = 0;

    data++;

    await fetch(dbURL + "/visits.json", {
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    });

    document.getElementById("v").innerText = data;
}

/* ================= MUSIC ================= */
const audio = document.getElementById("audio");
const vol = document.getElementById("vol");

audio.volume = 0.5;
vol.value = 0.5;

function toggle(){
    if(audio.paused) audio.play();
    else audio.pause();
}

vol.addEventListener("input",()=>{
    audio.volume = vol.value;
});

/* ================= START SCREEN ================= */
document.getElementById("start").onclick = async ()=>{
    document.getElementById("start").style.display="none";

    audio.play();
    loadVisits();
};
</script>

</body>
</html>
