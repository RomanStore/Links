<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* ================= OVERLAY ================= */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    cursor:pointer;
    text-align:center;
}

.overlay h1{
    color:#00f7ff;
    margin:0;
}

.overlay p{
    font-size:13px;
    opacity:0.8;
}

/* ================= MAIN ================= */
.container{
    background:#111827;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
    position:relative;
}

/* PROFILE */
.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
    margin-bottom:10px;
}

h1{margin:5px 0;}

/* BIO ANIMATION */
.bio{
    font-size:14px;
    opacity:0.85;
    margin-bottom:10px;
    min-height:20px;
    border-right:2px solid #00f7ff;
    white-space:nowrap;
    overflow:hidden;
    display:inline-block;
}

/* VISITS */
.visits{
    font-size:13px;
    opacity:0.8;
    margin-bottom:12px;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.link{
    padding:10px 12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    font-weight:600;
    transition:0.2s;
    border:2px solid transparent;
}

.link:hover{
    transform:scale(1.02);
    border:2px solid #7dd3fc;
}

.link:active{
    border:2px solid #38bdf8;
}

.link img{
    width:22px;
    height:22px;
}

.link span.username{
    font-size:11px;
    opacity:0.7;
}

/* MUSIC */
.music-player{
    margin-top:10px;
    background:#1f2937;
    border-radius:14px;
    padding:10px;
}

.music-btn{
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    color:#000;
    border:none;
    padding:8px 14px;
    border-radius:16px;
    cursor:pointer;
    font-weight:600;
    font-size:13px;
    margin-bottom:8px;
}

.volume-slider{
    width:100%;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <div>
        <h1>CLICK ANYWHERE</h1>
        <p>Enter Roman Store</p>
    </div>
</div>

<div class="container">

<img src="bgimage.jpg" class="profile">

<h1>Roman Store</h1>

<!-- VISITS -->
<div class="visits">
👁️ <span id="visitCount">0</span> visits
</div>

<!-- BIO -->
<p class="bio" id="bioText"></p>

<!-- LINKS -->
<div class="links">

<a href="https://snapchat.com/add/roman_store4" class="link" target="_blank">
<img src="https://cdn.simpleicons.org/snapchat/white">
<span>Snapchat</span>
<span class="username">roman_store4</span>
</a>

<a href="https://tiktok.com/@roman_store4" class="link" target="_blank">
<img src="https://cdn.simpleicons.org/tiktok/white">
<span>TikTok</span>
<span class="username">roman_store4</span>
</a>

<a href="https://facebook.com/roman.mhamad.196510" class="link" target="_blank">
<img src="https://cdn.simpleicons.org/facebook/white">
<span>Facebook</span>
<span class="username">roman.mhamad.196510</span>
</a>

<a href="https://wa.me/9647517039789" class="link" target="_blank">
<img src="https://cdn.simpleicons.org/whatsapp/white">
<span>WhatsApp</span>
<span class="username">+9647517039789</span>
</a>

<a href="https://t.me/RomanMhamad" class="link" target="_blank">
<img src="https://cdn.simpleicons.org/telegram/white">
<span>Telegram</span>
<span class="username">RomanMhamad</span>
</a>

</div>

<!-- MUSIC -->
<div class="music-player">

<audio id="bgMusic" loop>
<source src="bgmusic.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">▶️ Play / Pause</button>

<input type="range" min="0" max="1" step="0.01" class="volume-slider" id="volume">

</div>

</div>

<script>

/* ================= CLICK ANYWHERE START ================= */
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgMusic");
const volume = document.getElementById("volume");

overlay.addEventListener("click", async () => {
    overlay.style.display = "none";
    try {
        await audio.play();
    } catch(e){}
});

/* ================= VISITS (DEVICE BASED) ================= */
let visits = localStorage.getItem("roman_visits") || 0;
visits = parseInt(visits) + 1;
localStorage.setItem("roman_visits", visits);
document.getElementById("visitCount").textContent = visits;

/* ================= MUSIC ================= */
audio.volume = 0.5;
volume.value = 0.5;

function toggleMusic(){
    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

volume.addEventListener("input",()=>{
    audio.volume = volume.value;
});

/* ================= BIO TYPE + BACKSPACE ================= */
const bioText = document.getElementById("bioText");

const texts = [
    "ROMAN STORE TOP 1 KURDISH ONLINE GAMING STORE",
    "BEST DIGITAL STORE IN KURDISTAN",
    "FAST | SAFE | RELIABLE"
];

let i = 0;
let index = 0;
let deleting = false;

function typeEffect(){
    let current = texts[index];

    if(!deleting){
        bioText.textContent = current.substring(0, i++);
        if(i > current.length){
            deleting = true;
            setTimeout(typeEffect, 1200);
            return;
        }
    }else{
        bioText.textContent = current.substring(0, i--);
        if(i < 0){
            deleting = false;
            index = (index + 1) % texts.length;
            setTimeout(typeEffect, 300);
            return;
        }
    }

    setTimeout(typeEffect, deleting ? 40 : 70);
}

typeEffect();

</script>

</body>
</html>
