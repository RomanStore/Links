<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Store | Links</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #00f7ff;
    margin-bottom:10px;
}

h1{margin:5px 0;}
.bio{
    font-size:14px;
    opacity:0.7;
    margin-bottom:20px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
}

.link{
    padding:14px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
}

.link img{
    width:24px;
    height:24px;
}

.link span.username{
    font-size:12px;
    opacity:0.7;
}

/* MUSIC */
.music-player{
    background:#1f2937;
    border-radius:15px;
    padding:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.music-btn{
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    color:#000;
    border:none;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
    font-weight:600;
}

/* 🔥 NEW VOLUME SLIDER */
.volume-slider{
    width:100%;
    margin-top:10px;
    -webkit-appearance:none;
    appearance:none;
    height:6px;
    border-radius:10px;
    background:#374151;
    outline:none;
}

/* slider thumb */
.volume-slider::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#00f7ff;
    cursor:pointer;
    box-shadow:0 0 10px #00f7ff;
}

.volume-slider::-moz-range-thumb{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#00f7ff;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<img src="bgimage.jpg" class="profile">

<h1>Roman Store</h1>
<p class="bio">🎮 Gaming Store |📍 Kurdistan</p>

<div class="links">

<a href="https://snapchat.com/add/roman_store4" class="link">
<img src="https://cdn.simpleicons.org/snapchat/white">
<span>Snapchat</span>
<span class="username">roman_store4</span>
</a>

<a href="https://tiktok.com/@roman_store4" class="link">
<img src="https://cdn.simpleicons.org/tiktok/white">
<span>TikTok</span>
<span class="username">roman_store4</span>
</a>

<a href="https://facebook.com/roman.mhamad.196510" class="link">
<img src="https://cdn.simpleicons.org/facebook/white">
<span>Facebook</span>
<span class="username">roman.mhamad.196510</span>
</a>

<a href="https://wa.me/9647517039789" class="link">
<img src="https://cdn.simpleicons.org/whatsapp/white">
<span>WhatsApp</span>
<span class="username">+9647517039789</span>
</a>

<a href="https://t.me/RomanMhamad" class="link">
<img src="https://cdn.simpleicons.org/telegram/white">
<span>Telegram</span>
<span class="username">RomanMhamad</span>
</a>

</div>

<!-- MUSIC -->
<div class="music-player">

<audio id="bgMusic" loop>
<source src="bgmusic.mp3">
</audio>

<button class="music-btn" id="playBtn" onclick="toggleMusic()">▶️ Play</button>

<!-- 🔥 NEW SLIDER -->
<input type="range" min="0" max="1" step="0.01"
       class="volume-slider"
       id="volumeSlider">

</div>

</div>

<script>
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("playBtn");
const slider = document.getElementById("volumeSlider");

let playing = false;

/* default volume */
audio.volume = 0.5;
slider.value = 0.5;

/* autoplay best-effort */
document.addEventListener("click", () => {
    if (!playing) {
        audio.play();
        playing = true;
        btn.textContent = "⏸️ Pause";
    }
}, { once:true });

function toggleMusic(){
    if(playing){
        audio.pause();
        btn.textContent = "▶️ Play";
        playing = false;
    }else{
        audio.play();
        btn.textContent = "⏸️ Pause";
        playing = true;
    }
}

/* 🔥 REAL VOLUME CONTROL (mobile + PC) */
slider.addEventListener("input", (e) => {
    audio.volume = e.target.value;
});
</script>

</body>
</html>
