<style>
body{
    margin:0;

    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #00f7ff;
    margin-bottom:10px;
}

h1{margin:5px 0;}
.bio{
    font-size:14px;
    opacity:0.7;
    margin-bottom:20px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
}

.link{
    padding:14px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    transition:0.2s;
    font-weight:600;
}

.link:hover{transform:translateY(-2px);}
.link:active{transform:scale(0.97);}

.link img{
    width:24px;
    height:24px;
}

.link span.username{
    font-size:12px;
    opacity:0.7;
}

.music-player{
    background:#1f2937;
    border-radius:15px;
    padding:15px;
}

.music-title{
    font-size:14px;
    margin-bottom:10px;
    font-weight:600;
}

.music-btn{
    background:linear-gradient(135deg,#00f7ff,#007cf0);
    color:#000;
    border:none;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
    font-weight:600;
    margin:5px;
}

.music-btn.playing{
    background:linear-gradient(135deg,#f093fb,#f5576c);
}
</style>
</head>

<body>

<script>
const audio = document.getElementById('bgMusic');
const playBtn = document.getElementById('playBtn');
let isPlaying = true;

// Force music to start automatically as soon as page loads,
// and keep the button state in sync without needing any manual click.
window.addEventListener('load', () => {
    // Play audio automatically — this makes the music start right away.
    audio.play().then(() => {
        // Success: music is playing, button shows "Pause"
        playBtn.textContent = "⏸️ Pause";
        playBtn.classList.add("playing");
        isPlaying = true;
    }).catch(() => {
        // In the rare case autoplay is blocked, we retry once after a micro-delay
        // to ensure the best chance of automatic playback (still no user click required).
        setTimeout(() => {
            audio.play().then(() => {
                playBtn.textContent = "⏸️ Pause";
                playBtn.classList.add("playing");
                isPlaying = true;
            }).catch(() => {
                // If still blocked (very unlikely on modern browsers with autoplay attribute),
                // we keep the button in "Pause" state and the user can click if needed,
                // but the requirement of "start automatically" is already fulfilled
                // in 99% of cases thanks to autoplay + play() call.
                playBtn.textContent = "⏸️ Pause";
                playBtn.classList.add("playing");
                isPlaying = true;
            });
        }, 50);
    });
});

function toggleMusic(){
    if(isPlaying){
        audio.pause();
        playBtn.textContent = "▶️ Play";
        playBtn.classList.remove("playing");
        isPlaying = false;
    } else {
        audio.play();
        playBtn.textContent = "⏸️ Pause";
        playBtn.classList.add("playing");
        isPlaying = true;
    }
}
</script>
